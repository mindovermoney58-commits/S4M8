<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="lock.js"></script>
<title>SAM // ATHLETE OS</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D12; --bg2:#0E1219; --panel:#141924; --panel2:#1A2130; --line:#252E40; --line2:#2E3A52;
    --text:#EDF0F5; --muted:#7E8A9C; --dim:#556074;
    --gold:#F5B942; --gold2:#FFD97A; --ember:#FF6B4A; --ember2:#FF8F6B;
    --locked:#39445A; --ok:#5BC77E;
    --glow-gold:rgba(245,185,66,.45); --glow-ember:rgba(255,107,74,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;
    padding-bottom:96px;min-height:100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(245,185,66,.07), transparent),
      radial-gradient(ellipse 60% 40% at 90% 110%, rgba(255,107,74,.05), transparent);
    background-attachment:fixed;
  }
  h1,h2,h3{font-family:'Chakra Petch',sans-serif;letter-spacing:.03em}
  @media(min-width:700px){body{max-width:640px;margin:0 auto}.tabs{max-width:600px}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ===== HEADER ===== */
  header{
    margin:14px 14px 4px;padding:20px 18px;border-radius:20px;position:relative;overflow:hidden;
    background:linear-gradient(145deg,#161C28 0%,#10141D 60%,#141924 100%);
    border:1px solid var(--line);
    display:flex;gap:18px;align-items:center;
  }
  header::before{content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle at 85% 15%, rgba(245,185,66,.10), transparent 50%),
      repeating-linear-gradient(90deg, transparent 0 23px, rgba(255,255,255,.014) 23px 24px);
    pointer-events:none}
  .ring{position:relative;width:84px;height:84px;flex:none;filter:drop-shadow(0 0 12px var(--glow-gold))}
  .ring svg{transform:rotate(-90deg)}
  .ring circle{transition:stroke-dashoffset .8s cubic-bezier(.3,1,.4,1)}
  .ring .lvl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .lvl b{font-family:'Chakra Petch';font-size:27px;line-height:1;
    background:linear-gradient(180deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .ring .lvl span{font-size:9px;color:var(--muted);letter-spacing:.22em;margin-top:2px}
  .hstats{position:relative;flex:1;min-width:0}
  .hstats .eyebrow{font-family:'Chakra Petch';font-size:10px;letter-spacing:.28em;color:var(--ember);text-transform:uppercase;margin-bottom:3px}
  .hstats h1{font-size:19px;text-transform:uppercase}
  .hstats .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .xpwrap{margin-top:10px}
  .xptxt{display:flex;justify-content:space-between;font-family:'Chakra Petch';font-size:11px;color:var(--gold);margin-bottom:5px}
  .xptxt span:last-child{color:var(--muted)}
  .xpbar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
  .xpbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));
    box-shadow:0 0 8px var(--glow-gold);transition:width .8s cubic-bezier(.3,1,.4,1)}

  /* ===== TAB BAR ===== */
  .tabs{
    position:fixed;bottom:14px;left:14px;right:14px;display:flex;z-index:9;
    background:rgba(20,25,36,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:18px;padding:6px;
    box-shadow:0 12px 32px rgba(0,0,0,.55);
    margin:0 auto;
  }
  .tab{flex:1;text-align:center;padding:9px 0 8px;border-radius:13px;cursor:pointer;user-select:none;
    color:var(--muted);transition:all .2s}
  .tab svg{width:19px;height:19px;display:block;margin:0 auto 3px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab b{font-family:'Chakra Petch';font-weight:600;font-size:10px;letter-spacing:.14em;text-transform:uppercase}
  .tab.on{color:#1A1200;background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 4px 16px var(--glow-gold)}

  /* ===== SECTIONS ===== */
  section{padding:18px 14px 4px}
  .view{display:none}
  .view.on{display:block;animation:fadein .28s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sechead{font-family:'Chakra Petch';font-size:11px;text-transform:uppercase;letter-spacing:.22em;color:var(--muted);
    margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .sechead::before{content:"";width:14px;height:2px;background:var(--ember);border-radius:1px}
  .sechead::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  /* ===== PLAN — TIMELINE RAIL ===== */
  .rail{position:relative;padding-left:26px}
  .rail::before{content:"";position:absolute;left:9px;top:12px;bottom:12px;width:2px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--line) 45%,var(--line) 100%)}
  .pmark{position:absolute;left:0;width:20px;height:20px;border-radius:50%;border:2px solid var(--locked);
    background:var(--bg);z-index:1;display:flex;align-items:center;justify-content:center;
    font-family:'Chakra Petch';font-size:10px;color:var(--muted)}
  .phase{position:relative;margin-bottom:14px}
  .phase.done>.pmark{border-color:var(--gold);background:var(--gold);color:#1A1200}
  .phase.now>.pmark{border-color:var(--ember);color:var(--ember);box-shadow:0 0 0 4px rgba(255,107,74,.15);animation:markpulse 2s infinite}
  @keyframes markpulse{0%,100%{box-shadow:0 0 0 4px rgba(255,107,74,.15)}50%{box-shadow:0 0 0 7px rgba(255,107,74,.05)}}
  .pcard{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;overflow:hidden;
    transition:border-color .2s}
  .phase.now .pcard{border-color:rgba(255,107,74,.5);box-shadow:0 6px 24px rgba(255,107,74,.08)}
  .phead{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;user-select:none}
  .phead .pi b{font-family:'Chakra Petch';font-size:15px;display:block;text-transform:uppercase;letter-spacing:.04em}
  .phase.now .phead .pi b{color:var(--ember2)}
  .phead .pi span{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
  .pring{position:relative;width:44px;height:44px;flex:none}
  .pring svg{transform:rotate(-90deg)}
  .pring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch';font-size:11px;color:var(--gold)}
  .pbody{display:none;border-top:1px solid var(--line);padding:6px 16px 16px}
  .phase.open .pbody{display:block}
  .gate{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(37,46,64,.6);cursor:pointer}
  .gate:last-of-type{border-bottom:none}
  .gate .gbox{width:22px;height:22px;border:2px solid var(--locked);border-radius:7px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s}
  .gate.done .gbox{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);color:#1A1200;
    box-shadow:0 0 10px var(--glow-gold)}
  .gate .gt{flex:1;font-size:13.5px}
  .gate.done .gt{color:var(--dim);text-decoration:line-through;text-decoration-color:rgba(245,185,66,.4)}
  .gate:active .gbox{transform:scale(.9)}
  .pnote{font-size:12.5px;color:#C6CDD8;background:rgba(255,107,74,.06);border:1px solid rgba(255,107,74,.18);
    border-left:3px solid var(--ember);border-radius:10px;padding:11px 13px;margin-top:12px;white-space:pre-line}

  /* ===== RULES ===== */
  .rule{display:flex;gap:14px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:13px 15px;margin-bottom:9px;font-size:13.5px;color:#C6CDD8}
  .rule b{font-family:'Chakra Petch';font-size:17px;flex:none;width:22px;text-align:center;
    background:linear-gradient(180deg,var(--gold2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}

  /* ===== WEEK ===== */
  .dayc{background:linear-gradient(160deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;margin-bottom:11px;overflow:hidden;transition:border-color .2s}
  .dayc.today{border-color:rgba(245,185,66,.55);box-shadow:0 6px 24px rgba(245,185,66,.08)}
  .dayh{padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;user-select:none}
  .dayh .dl{display:flex;align-items:center;gap:12px;min-width:0}
  .dayh .dtag{font-family:'Chakra Petch';font-weight:700;font-size:12px;letter-spacing:.06em;flex:none;
    width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    background:var(--panel2);border:1px solid var(--line);color:var(--muted)}
  .dayc.today .dtag{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);color:#1A1200;box-shadow:0 0 12px var(--glow-gold)}
  .dayh .di b{font-family:'Chakra Petch';font-size:14px;text-transform:uppercase;display:block}
  .dayh .di span{font-size:11.5px;color:var(--muted)}
  .dayh .chev{color:var(--dim);transition:transform .2s;flex:none}
  .dayc.open .chev{transform:rotate(180deg)}
  .dayb{display:none;border-top:1px solid var(--line)}
  .dayc.open .dayb{display:block}
  .wblock{padding:11px 16px;border-bottom:1px solid rgba(37,46,64,.6)}
  .wblock:last-child{border-bottom:none}
  .wblock .bn{font-family:'Chakra Petch';font-size:11px;color:var(--ember2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;
    display:flex;align-items:center;gap:7px}
  .wblock .bn::before{content:"";width:5px;height:5px;border-radius:2px;background:var(--ember);transform:rotate(45deg)}
  .wblock .ex{display:flex;justify-content:space-between;gap:12px;padding:4px 0;font-size:13.5px}
  .wblock .ex span:first-child{color:#C6CDD8}
  .wblock .ex span:last-child{font-family:'Chakra Petch';font-size:12.5px;color:var(--text);white-space:nowrap;text-align:right}
  .weeknote{font-size:12px;color:var(--muted);background:var(--panel);border:1px dashed var(--line2);border-radius:12px;padding:11px 13px;margin-top:4px}

  /* ===== FOCUS ===== */
  .focus{display:flex;flex-direction:column;gap:10px}
  .frow{display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;
    background:linear-gradient(140deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:16px;
    padding:14px 16px;cursor:pointer;transition:transform .15s,border-color .2s}
  .frow:active{transform:scale(.985)}
  .frow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--ember2),var(--ember))}
  .frow .rank{font-family:'Chakra Petch';font-weight:700;font-size:26px;width:28px;text-align:center;flex:none;
    background:linear-gradient(180deg,var(--ember2),var(--ember));-webkit-background-clip:text;background-clip:text;color:transparent}
  .frow .fi{flex:1;min-width:0}
  .frow .fi b{font-family:'Chakra Petch';font-size:15.5px;display:block;text-transform:uppercase;letter-spacing:.03em}
  .frow .fi span{font-size:12px;color:var(--muted)}
  .frow .go{font-family:'Chakra Petch';font-size:10.5px;color:var(--gold);letter-spacing:.14em;white-space:nowrap;
    border:1px solid rgba(245,185,66,.35);border-radius:8px;padding:6px 10px}

  /* ===== QUESTS ===== */
  .quest{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:13px 15px;margin-bottom:9px;cursor:pointer;overflow:hidden;transition:transform .15s}
  .quest:active{transform:scale(.985)}
  .quest::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ember)}
  .quest.done::before{background:var(--gold)}
  .quest .qt{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .quest .qt b{font-family:'Chakra Petch';font-size:13.5px;text-transform:uppercase;letter-spacing:.03em}
  .quest .qt span{font-family:'Chakra Petch';font-size:13px;color:var(--ember2);white-space:nowrap}
  .quest.done .qt span{color:var(--gold)}
  .qbar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;margin-top:9px;overflow:hidden}
  .qbar i{display:block;height:100%;background:linear-gradient(90deg,var(--ember),var(--gold));border-radius:3px;
    box-shadow:0 0 8px var(--glow-ember);transition:width .6s cubic-bezier(.3,1,.4,1)}
  .hint{font-size:11px;color:var(--dim);margin-top:6px}

  /* ===== TREE ===== */
  .cat{margin-bottom:14px}
  .cathead{display:flex;justify-content:space-between;align-items:center;
    background:linear-gradient(140deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;
    padding:12px 16px;cursor:pointer;user-select:none}
  .cathead .cl{display:flex;align-items:center;gap:10px}
  .cathead h2{font-size:13.5px;text-transform:uppercase;letter-spacing:.05em}
  .cathead .cnt{font-family:'Chakra Petch';font-size:11.5px;color:var(--muted);
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:7px;padding:3px 8px}
  .cat.open .cathead{border-color:var(--line2)}
  .chain{padding:8px 0 2px 26px;position:relative;display:none}
  .cat.open .chain{display:block;animation:fadein .25s ease}
  .chain::before{content:"";position:absolute;left:12px;top:4px;bottom:16px;width:2px;
    background:linear-gradient(180deg,var(--gold) 0%,var(--line) 60%)}
  .node{position:relative;display:flex;align-items:center;gap:10px;padding:10px 8px 10px 4px;cursor:pointer;border-radius:10px;transition:background .15s}
  .node:active{background:rgba(255,255,255,.03)}
  .node .dot{position:absolute;left:-19px;width:13px;height:13px;border-radius:4px;transform:rotate(45deg);
    border:2px solid var(--locked);background:var(--bg);z-index:1;transition:all .2s}
  .node.mastered .dot{background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);box-shadow:0 0 9px var(--glow-gold)}
  .node.active .dot{border-color:var(--ember);animation:pulse 1.7s infinite}
  .node.available .dot{border-color:var(--text)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--glow-ember)}50%{box-shadow:0 0 0 6px rgba(255,107,74,0)}}
  .node .nm{flex:1;font-size:14px}
  .node.mastered .nm{color:var(--dim);text-decoration:line-through;text-decoration-color:rgba(245,185,66,.4)}
  .node.locked .nm{color:var(--locked)}
  .node.locked .dot{border-style:dashed}
  .node.active .nm{color:var(--ember2);font-weight:600}
  .node .best{font-family:'Chakra Petch';font-size:11.5px;color:var(--gold);
    background:rgba(245,185,66,.08);border:1px solid rgba(245,185,66,.25);border-radius:7px;padding:2px 7px;white-space:nowrap}
  .node .xp{font-family:'Chakra Petch';font-size:10.5px;color:var(--dim);white-space:nowrap}
  .node.mastered .xp{color:var(--gold)}

  /* ===== SHEET ===== */
  .sheet-bg{position:fixed;inset:0;background:rgba(4,6,10,.72);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:none;z-index:10}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-height:86vh;overflow-y:auto;
    background:linear-gradient(180deg,var(--panel2),var(--panel) 120px);
    border:1px solid var(--line2);border-bottom:none;border-radius:22px 22px 0 0;
    padding:10px 18px 32px;display:none;z-index:11;box-shadow:0 -16px 48px rgba(0,0,0,.5)}
  @media(min-width:700px){.sheet{max-width:640px;margin:0 auto}}
  .sheet.on{display:block;animation:sheetup .3s cubic-bezier(.2,1,.35,1)}
  .sheet-bg.on{display:block;animation:fadein .2s}
  @keyframes sheetup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .grab{width:40px;height:4px;border-radius:2px;background:var(--line2);margin:4px auto 16px}
  .sheet h3{font-size:18px;text-transform:uppercase}
  .sheet .tier{font-family:'Chakra Petch';font-size:11px;letter-spacing:.12em;color:var(--gold);margin:4px 0 14px;text-transform:uppercase}
  .sheet .how{background:rgba(255,107,74,.06);border:1px solid rgba(255,107,74,.18);border-radius:12px;
    padding:12px 14px;font-size:13.5px;color:#C6CDD8;margin-bottom:14px;white-space:pre-line}
  .sess{border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:14px;background:var(--bg2)}
  .sess .sh{background:linear-gradient(90deg,rgba(245,185,66,.12),transparent);padding:10px 14px;
    font-family:'Chakra Petch';font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);
    display:flex;justify-content:space-between;gap:8px}
  .sess .sh span:last-child{color:var(--muted);text-align:right}
  .sblock{padding:10px 14px;border-top:1px solid rgba(37,46,64,.6)}
  .sblock .bn{font-family:'Chakra Petch';font-size:11px;color:var(--ember2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;
    display:flex;align-items:center;gap:7px}
  .sblock .bn::before{content:"";width:5px;height:5px;border-radius:2px;background:var(--ember);transform:rotate(45deg)}
  .sblock .ex{display:flex;justify-content:space-between;gap:12px;padding:4px 0;font-size:13.5px}
  .sblock .ex span:first-child{color:#C6CDD8}
  .sblock .ex span:last-child{font-family:'Chakra Petch';font-size:12.5px;color:var(--text);white-space:nowrap;text-align:right}
  .logrow{display:flex;gap:10px;margin-bottom:12px}
  .logrow input{flex:1;background:var(--bg);border:1px solid var(--line2);border-radius:12px;color:var(--text);
    padding:12px 14px;font-family:'Chakra Petch';font-size:16px}
  .logrow input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,185,66,.12)}
  .btn{font-family:'Chakra Petch';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.08em;
    border:none;border-radius:12px;padding:12px 18px;cursor:pointer;transition:transform .12s,box-shadow .2s}
  .btn:active{transform:scale(.97)}
  .btn.log{background:var(--panel2);color:var(--text);border:1px solid var(--line2)}
  .btn.master{width:100%;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1A1200;padding:14px;
    box-shadow:0 6px 20px var(--glow-gold)}
  .btn.master:disabled{background:var(--locked);color:var(--muted);box-shadow:none;cursor:not-allowed}
  .btn.unmaster{width:100%;background:transparent;border:1px solid var(--line2);color:var(--muted);padding:12px;margin-top:10px}
  .hist{margin-top:16px}
  .hist .h{font-family:'Chakra Petch';font-size:10.5px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);margin-bottom:6px}
  .hist .e{display:flex;justify-content:space-between;font-family:'Chakra Petch';font-size:13px;padding:7px 0;border-bottom:1px solid rgba(37,46,64,.6)}
  .hist .e span:last-child{color:var(--gold)}

  /* ===== TOAST ===== */
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);
    background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1A1200;
    font-family:'Chakra Petch';font-weight:700;font-size:13.5px;letter-spacing:.03em;
    padding:13px 24px;border-radius:14px;transition:transform .38s cubic-bezier(.2,1.4,.4,1);z-index:20;
    box-shadow:0 10px 34px var(--glow-gold);white-space:nowrap}
  .toast.on{transform:translateX(-50%) translateY(0)}
  .loading{padding:70px 20px;text-align:center;color:var(--muted);font-family:'Chakra Petch';letter-spacing:.2em}
</style>
</head>
<body>

<div id="app"><div class="loading">LOADING SAVE FILE…</div></div>
<div class="tabs">
  <div class="tab on" data-v="plan" onclick="switchTab('plan')">
    <svg viewBox="0 0 24 24"><path d="M12 3v18M12 6l6-2v5l-6 2M12 13l-6-2v5l6 2"/></svg><b>Plan</b></div>
  <div class="tab" data-v="week" onclick="switchTab('week')">
    <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M3 10h18M8 3v4M16 3v4"/></svg><b>Week</b></div>
  <div class="tab" data-v="tree" onclick="switchTab('tree')">
    <svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="6" rx="1.5" transform="rotate(45 12 6)"/><rect x="4" y="14" width="5" height="5" rx="1.2" transform="rotate(45 6.5 16.5)"/><rect x="15" y="14" width="5" height="5" rx="1.2" transform="rotate(45 17.5 16.5)"/><path d="M12 10v3M12 13l-5 3M12 13l5 3"/></svg><b>Tree</b></div>

      const gd=S.gates.includes(g.id);
      h+=`<div class="gate ${gd?'done':''}" onclick="toggleGate('${g.id}')">
        <div class="gbox">${gd?'✓':''}</div><div class="gt">${g.t}</div></div>`;
    }
    h+=`<div class="pnote">${p.note}</div></div></div></div>`;
  });
  h+=`</div></section><section><div class="sechead">Decision Rules</div>`;
  for(const r of RULES)h+=`<div class="rule"><b>${r[0]}</b><div>${r[1]}</div></div>`;
  h+=`</section>`;
  return h;
}

function renderWeek(){
  let h=`<section><div class="sechead">Weekly Program · balance → strength → volume → core</div>`;
  const dow=new Date().getDay();const todayIdx=dow===0?6:dow-1;
  WEEK.forEach((w,i)=>{
    h+=`<div class="dayc ${openDay[i]?'open':''} ${i===todayIdx?'today':''}">
      <div class="dayh" onclick="toggleDay(${i})">
        <div class="dl"><div class="dtag">${w.d}</div>
        <div class="di"><b>${w.n}</b><span>${w.loc}</span></div></div>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="dayb">`;
    for(const b of w.blocks){
      h+=`<div class="wblock"><div class="bn">${b.n}</div>`;
      for(const e of b.ex)h+=`<div class="ex"><span>${e[0]}</span><span>${e[1]}</span></div>`;
      h+=`</div>`;
    }
    h+=`</div></div>`;
  });
  h+=`<div class="weeknote">Every 4th week: deload — 4 days, 45 min, −40% sets, no PRs, no negatives, keep balance work. Weekly pressing capped at ~18 hard sets (why the HSPU→p-bar handoff exists). Daily non-negotiable: 5-min wrist prep.</div></section>`;
  return h;
}

function renderTree(){
  let h=`<section><div class="sechead">Current Focus</div><div class="focus">`;
  FOCUS.forEach((f,i)=>{
    h+=`<div class="frow" onclick="openSheet('${f.id}')">
      <div class="rank">${i+1}</div>
      <div class="fi"><b>${f.label}</b><span>${f.sub}</span></div>
      <div class="go">SESSION</div></div>`;
  });
  h+=`</div></section><section><div class="sechead">Active Quests — Phase 1</div>`;
  for(const q of QUESTS){
    const st=S.quests.find(x=>x.id===q.id);
    const pct=Math.min(100,Math.round(st.cur/q.goal*100));
    h+=`<div class="quest ${st.cur>=q.goal?'done':''}" onclick="bumpQuest('${q.id}',${q.goal})">
      <div class="qt"><b>${q.n}</b><span>${st.cur} / ${q.goal} ${q.unit}</span></div>
      <div class="qbar"><i style="width:${pct}%"></i></div></div>`;
  }
  h+=`<div class="hint">Tap a quest to +1 progress</div></section>`;
  h+=`<section><div class="sechead">Skill Tree</div>`;
  for(const c of CATS){
    const done=c.skills.filter(s=>S.mastered.includes(s.id)).length;
    h+=`<div class="cat ${openCat[c.id]?'open':''}">
      <div class="cathead" onclick="toggleCat('${c.id}')"><div class="cl"><h2>${c.name}</h2></div><span class="cnt">${done}/${c.skills.length}</span></div>
      <div class="chain">`;
    for(const sk of c.skills){
      const st=status(sk,c);
      const logs=S.logs[sk.id]||[];
      const best=logs.length?Math.max(...logs.map(l=>l.v)):null;
      h+=`<div class="node ${st}" onclick="openSheet('${sk.id}')">
        <span class="dot"></span><span class="nm">${sk.n}</span>
        ${best!==null&&sk.unit?`<span class="best">${best} ${sk.unit}</span>`:""}
        <span class="xp">${st==='mastered'?'✓ '+TIERS[sk.t]:'+'+TIERS[sk.t]}</span></div>`;
    }
    h+=`</div></div>`;
  }
  h+=`</section>`;
  return h;
}

function togglePhase(id){openPhase[id]=!openPhase[id];render()}
function toggleDay(i){openDay[i]=!openDay[i];render()}
function toggleCat(id){openCat[id]=!openCat[id];render()}

async function toggleGate(id){
  if(S.gates.includes(id)){S.gates=S.gates.filter(x=>x!==id)}
  else{S.gates.push(id);S.xp+=100;toast("GATE CLEARED · +100 XP")}
  await save();render();
}
async function bumpQuest(id,goal){
  const q=S.quests.find(x=>x.id===id);
  if(q.cur>=goal)return;
  q.cur++;await save();render();
  if(q.cur>=goal)toast("QUEST COMPLETE 🏆");
}

function renderSession(sess){
  let h=`<div class="sess"><div class="sh"><span>Mastery Session</span><span>${sess.loc} · ${sess.dur}</span></div>`;
  for(const b of sess.blocks){
    h+=`<div class="sblock"><div class="bn">${b.n}</div>`;
    for(const e of b.ex)h+=`<div class="ex"><span>${e[0]}</span><span>${e[1]}</span></div>`;
    h+=`</div>`;
  }
  return h+`</div>`;
}

function openSheet(id){
  const sk=findSkill(id),c=catOf(id),st=status(sk,c);
  const logs=S.logs[id]||[];
  const sheet=document.getElementById("sheet");
  let h=`<div class="grab"></div><h3>${sk.n}</h3><div class="tier">Tier ${sk.t} · ${TIERS[sk.t]} XP · ${st}</div>`;
  if(sk.how)h+=`<div class="how">${sk.how}</div>`;
  else if(st==="locked"&&!SESSIONS[id])h+=`<div class="how">Locked — master the previous node in this chain first.</div>`;
  if(SESSIONS[id])h+=renderSession(SESSIONS[id]);
  if(sk.unit&&st!=="locked"){
    h+=`<div class="logrow"><input type="number" inputmode="decimal" id="logval" placeholder="Log ${sk.unit}">
    <button class="btn log" onclick="addLog('${id}')">Log</button></div>`;
  }
  if(st==="mastered"){
    h+=`<button class="btn unmaster" onclick="unmaster('${id}')">Undo mastered</button>`;
  }else{
    h+=`<button class="btn master" ${st==="locked"?"disabled":""} onclick="master('${id}')">Mark mastered · +${TIERS[sk.t]} XP</button>`;
  }
  if(logs.length){
    h+=`<div class="hist"><div class="h">Log history</div>`;
    for(const e of [...logs].reverse().slice(0,10))h+=`<div class="e"><span>${e.d}</span><span>${e.v} ${sk.unit||""}</span></div>`;
    h+=`</div>`;
  }
  sheet.innerHTML=h;
  sheet.classList.add("on");document.getElementById("sheetbg").classList.add("on");
}
function closeSheet(){document.getElementById("sheet").classList.remove("on");document.getElementById("sheetbg").classList.remove("on")}

async function addLog(id){
  const v=parseFloat(document.getElementById("logval").value);
  if(isNaN(v))return;
  if(!S.logs[id])S.logs[id]=[];
  S.logs[id].push({d:today(),v});
  await save();openSheet(id);render();
  const sk=findSkill(id);
  toast(`LOGGED ${v} ${sk.unit||""}`.trim());
}
async function master(id){
  const sk=findSkill(id),c=catOf(id);
  if(status(sk,c)==="locked")return;
  S.mastered.push(id);S.xp+=TIERS[sk.t];
  await save();closeSheet();render();
  toast(`${sk.n.toUpperCase()} MASTERED · +${TIERS[sk.t]} XP`);
}
async function unmaster(id){
  const sk=findSkill(id);
  S.mastered=S.mastered.filter(x=>x!==id);S.xp-=TIERS[sk.t];
  await save();closeSheet();render();
}

let toastT=null;
function toast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),2200);
}

load();
</script>
</body>
</html>
